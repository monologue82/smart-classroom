<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班级管理系统 v</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入LuminaUI样式 -->
    <link rel="stylesheet" href="LuminaUI/css/lumina.css">
    <link rel="stylesheet" href="LuminaUI/css/buttons.css">
    <link rel="stylesheet" href="LuminaUI/css/notification.css">
    <!-- 引入页面切换动画样式 -->
    
    <style>
        :root {
            --primary: #6C63FF; /* 紫色系作为主要强调色，更显灵动 */
            --secondary: #4A44A8;
            --accent: #FF6584; /* 活力粉色 */
            --light: #F8F9FF; /* 淡紫色背景 */
            --dark: #2A2D3A; /* 深色文字 */
            --success: #4DB1A7; /* 绿色 */
            --warning: #FFB242; /* 橙色 */
            --danger: #FF6B6B; /* 红色 */
            --gray: #9599A8; /* 灰色文字 */
            --gray-medium: #6C7284; /* 中等灰色 */
            --card-bg: rgba(255, 255, 255, 0.75); /* 高透明度毛玻璃效果 */
            --glass-bg: rgba(255, 255, 255, 0.75); /* 毛玻璃效果 */
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.15); /* 柔和阴影 */
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* 平滑过渡 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e7f1 100%); /* 柔和渐变背景 */
            min-height: 100vh;
            padding-top: 70px; /* 为固定导航栏留出空间 */
            color: var(--dark);
            overflow-x: hidden;
            position: relative;
        }

        /* 背景装饰元素 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(108, 99, 255, 0.05) 0%, rgba(255, 255, 255, 0) 20%),
                        radial-gradient(circle at 90% 80%, rgba(255, 101, 132, 0.05) 0%, rgba(255, 255, 255, 0) 20%);
            z-index: -1;
        }

        .container {
            max-width: 100%;
            width: 95%;
            margin: 0 auto;
            padding: 20px;
            min-height: 90vh;
        }

        /* 导航栏样式 - 高级毛玻璃设计 */
        .main-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.85); /* 毛玻璃效果 */
            backdrop-filter: blur(16px); /* 毛玻璃模糊效果 */
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 1000;
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .main-navbar.scrolled {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            max-width: 100%;
            margin: 0 auto;
            padding: 0 30px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            color: var(--primary);
            font-size: 18px;
            transition: var(--transition);
        }

        .nav-brand:hover {
            transform: translateX(5px);
        }

        .nav-brand i {
            font-size: 24px;
            transition: var(--transition);
        }

        .nav-brand:hover i {
            transform: rotate(5deg);
        }

        .nav-menu {
            display: flex;
            gap: 20px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--gray-medium);
            padding: 10px 16px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
            z-index: 1;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 8px;
            opacity: 0;
            transition: var(--transition);
            z-index: -1;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: var(--transition);
            border-radius: 2px;
        }

        .nav-link:hover {
            color: var(--primary);
            transform: translateY(-2px);
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link.active {
            color: var(--primary);
            font-weight: 600;
        }

        .nav-link.active::after {
            width: 100%;
            height: 3px;
        }

        .nav-link.active::before {
            opacity: 0.2;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            transition: var(--transition);
        }

        .user-avatar:hover {
            transform: scale(1.1);
        }

        .user-name {
            font-size: 15px;
            color: var(--dark);
            font-weight: 500;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: var(--transition);
            font-size: 16px;
        }

        .logout-btn:hover {
            color: var(--primary);
            background: rgba(108, 99, 255, 0.1);
            transform: rotate(15deg);
        }

        .nav-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 4px;
        }

        .nav-toggle span {
            width: 22px;
            height: 2px;
            background: var(--primary);
            margin: 3px 0;
            transition: 0.3s;
            border-radius: 2px;
        }

        /* 内容区域样式 - 取消卡片设计 */
        .content {
            padding: 20px 0;
            min-height: calc(100vh - 130px);
            line-height: 1.6;
        }

        /* 区域样式 - 取消卡片设计 */
        .section {
            background: var(--glass-bg);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        .section-header {
            margin-bottom: 20px;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .nav-menu {
                position: fixed;
                top: 60px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 60px);
                background: rgba(255, 255, 255, 0.9);
                backdrop-filter: blur(16px);
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding-top: 40px;
                transition: var(--transition);
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            }
            
            .nav-menu.active {
                left: 0;
            }
            
            .nav-link {
                width: 80%;
                margin: 10px 0;
                justify-content: center;
            }
            
            .nav-toggle {
                display: flex;
            }
            
            .nav-user {
                display: none;
            }
        }

        /* 高级动画效果 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            animation: fadeInUp 0.7s ease forwards;
            opacity: 0;
            background: var(--card-bg); /* 毛玻璃效果 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }

        /* 卡片样式 - 通透清爽风格 */
        .card {
            border-radius: 18px;
            padding: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border-color: rgba(108, 99, 255, 0.2);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transform: scaleX(0);
            transform-origin: left;
            transition: var(--transition);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card-icon {
            font-size: 45px;
            margin-bottom: 22px;
            color: var(--primary);
            transition: var(--transition);
        }

        .card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
            color: var(--accent);
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--dark);
            transition: var(--transition);
        }

        .card:hover .card-title {
            color: var(--primary);
        }

        .card-desc {
            font-size: 15px;
            line-height: 1.7;
            color: var(--gray-medium);
            margin-bottom: 25px;
            transition: var(--transition);
        }

        .card:hover .card-desc {
            color: var(--dark);
        }

        /* 卡片按钮样式 - 高级毛玻璃风格 */
        .card .btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            box-shadow: 0 6px 15px rgba(108, 99, 255, 0.3);
            backdrop-filter: blur(5px);
        }

        .card .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(108, 99, 255, 0.4);
            background: linear-gradient(90deg, var(--accent), var(--primary));
        }

        .card .btn:active {
            transform: translateY(-2px);
        }

        /* 统一按钮动画效果 */
        .btn {
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            transform: translateY(-1px) scale(0.98) !important;
            transition: transform 0.1s ease;
        }

        /* 所有按钮的统一悬停效果 */
        .btn-primary,
        .btn-success,
        .btn-warning,
        .btn-danger,
        .btn-secondary,
        .btn-info {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        /* 按钮涟漪效果 */
        .ripple-effect {
            position: relative;
            overflow: hidden;
        }

        .ripple-effect::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.5);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        .ripple-effect:active::after {
            animation: ripple 0.6s ease-out;
        }

        @keyframes ripple {
            0% {
                transform: scale(0, 0);
                opacity: 0.5;
            }
            100% {
                transform: scale(50, 50);
                opacity: 0;
            }
        }

        .card .btn i {
            font-size: 15px;
        }

        /* 页脚样式 - 通透清爽风格 */
        .footer {
            text-align: center;
            padding: 25px;
            color: var(--gray); /* 三级文字色 */
            font-size: 14px; /* 按照设计要求 */
            background: rgba(255, 255, 255, 0.5); /* 毛玻璃效果 */
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-top: 1px solid var(--glass-border);
        }

        .footer a {
            color: var(--gray-medium); /* 二级文字色 */
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .footer a:hover {
            color: var(--primary); /* 悬停时使用强调色 */
            transform: translateX(3px);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding-top: 130px; /* 移动端需要更多顶部空间 */
            }

            .content {
                padding: 25px;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .nav-container {
                padding: 0 15px;
            }

            .card {
                padding: 25px;
            }

            .card-title {
                font-size: 20px;
            }
        }

        .welcome-text {
            font-size: 16px;
            line-height: 1.6;
            color: var(--gray-medium);
            margin-bottom: 20px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        <!-- 主内容区域 -->
        <div class="content">
            <h2><i class="fas fa-tachometer-alt"></i> 控制面板</h2>
            <p class="welcome-text">欢迎使用智能教室管理系统，请选择您要操作的功能</p>
            
            <div class="dashboard" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px;">
                <!-- 积分管理 -->
                <div class="section" onclick="window.location.href='score.html'" style="cursor: pointer; transition: var(--transition);">
                    <h3 class="section-header" style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
                        <i class="fas fa-coins" style="color: var(--primary); font-size: 20px;"></i> 积分管理

                    <button class="btn primary" style="background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 50px; padding: 12px 24px; font-weight: 600; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size: 15px; box-shadow: 0 6px 15px rgba(108, 99, 255, 0.3); backdrop-filter: blur(5px); width: 100%; justify-content: center;">进入管理 <i class="fas fa-arrow-right"></i></button>

                <!-- 规则管理 -->

                        <i class="fas fa-book" style="color: var(--primary); font-size: 20px;"></i> 规则管理

                <!-- 随机抽号 -->
                <div class="section" onclick="window.location.href='random.html'" style="cursor: pointer; transition: var(--transition);">
                    <h3 class="section-header" style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">
                        <i class="fas fa-random" style="color: var(--primary); font-size: 20px;"></i> 随机抽号

                </div>
                
                <!-- 作业管理 -->
                <div class="section" onclick="window.location.href='homework.html'" style="cursor: pointer; transition: var(--transition);">
                    <h3 class="section-header" style="display: flex; align-items: center; gap: 12px; margin-bottom: 15px;">

                    <p style="color: var(--gray-medium); margin-bottom: 20px; line-height: 1.6;">管理学生值日情况，查看历史记录</p>
                    <button class="btn primary" style="background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 50px; padding: 12px 24px; font-weight: 600; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size: 15px; box-shadow: 0 6px 15px rgba(108, 99, 255, 0.3); backdrop-filter: blur(5px); width: 100%; justify-content: center;">进入管理 <i class="fas fa-arrow-right"></i></button>

    <script>
        // 导航栏交互脚本
        document.addEventListener('DOMContentLoaded', function() {
            const navToggle = document.getElementById('navToggle');
            const navMenu = document.getElementById('navMenu');
            
            // 移动端菜单切换
            navToggle && navToggle.addEventListener('click', function() {
                navMenu && navMenu.classList.toggle('active');
                
                // 汉堡菜单动画
                const spans = navToggle.querySelectorAll('span');
                if (navMenu && navMenu.classList.contains('active')) {
                    spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translate(7px, -6px)';
                } else {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            });
            
            // 滚动时导航栏样式变化
            window.addEventListener('scroll', function() {
                const navbar = document.getElementById('mainNavbar');
                if (navbar) {
                    if (window.scrollY > 100) {
                        navbar.classList.add('scrolled');
                    } else {
                        navbar.classList.remove('scrolled');
                    }
                }
            });
            
            // 设置当前页面的导航链接为活跃状态
            const currentPath = window.location.pathname.split('/').pop();
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                const linkPath = link.getAttribute('href');
                if (linkPath === currentPath) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });
            
            // 卡片悬停效果增强
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('mouseenter', () => {
                    card.style.transform = 'translateY(-10px) scale(1.02)';
                    card.style.boxShadow = '0 20px 40px rgba(0,0,0,0.15)';
                });
                
                card.addEventListener('mouseleave', () => {
                    card.style.transform = 'translateY(0) scale(1)';
                    card.style.boxShadow = '0 8px 32px 0 rgba(31, 38, 135, 0.15)';
                });
            });
            
            // 登出按钮功能
            const logoutBtn = document.querySelector('.logout-btn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', function() {
                    if (typeof authManager !== 'undefined') {
                        authManager.clearSession();
                    }
                    setTimeout(() => {
                        if (typeof showAlert !== 'undefined') {
                            showAlert('您已成功登出系统', 'success');
                        } else {
                            alert('您已成功登出系统');
                        }
                        window.location.href = './login.html';
                    }, 100);
                });
            }
        });
    </script>
